<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Restaurant - Smart Dining</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', -apple-system, sans-serif; }
        body { background: #0a0a0a; color: #fff; overflow-x: hidden; }
        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }
        .message-bubble {
            max-width: 80%;
            word-wrap: break-word;
        }
        .menu-card {
            transition: all 0.3s ease;
        }
        .menu-card:active {
            transform: scale(0.98);
        }
        .mic-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }
        .mic-btn.listening {
            animation: mic-pulse 1s ease-in-out infinite;
        }
        @keyframes mic-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .slide-up {
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .dish-img {
            object-fit: cover;
        }
        .tag {
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
        }
        .price-tag {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .cart-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    </style>
</head>
<body class="min-h-screen">
    <!-- App Container -->
    <div id="app" class="max-w-md mx-auto min-h-screen relative">
        
        <!-- Header -->
        <header class="fixed top-0 left-0 right-0 z-50 glass">
            <div class="max-w-md mx-auto px-4 py-3 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-500 to-blue-500 flex items-center justify-center">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-sm font-bold">AI Restaurant</h1>
                        <p class="text-xs text-gray-400">Lagos, Nigeria</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleLang()" id="langBtn" class="text-xs px-2 py-1 rounded-full glass text-gray-300">EN</button>
                    <div class="relative" onclick="showCart()">
                        <svg class="w-6 h-6 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                        </svg>
                        <span id="cartCount" class="cart-badge absolute -top-1 -right-1 w-4 h-4 rounded-full text-xs flex items-center justify-center hidden">0</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="pt-16 pb-24 px-4">
            
            <!-- Hero Section -->
            <section class="py-6">
                <h2 class="text-2xl font-bold mb-1" data-i18n="heroTitle">AI 智能点餐</h2>
                <p class="text-sm text-gray-400 mb-4" data-i18n="heroSubtitle">告诉我你的口味、预算和人数</p>
                
                <!-- Quick Tags -->
                <div class="flex flex-wrap gap-2 mb-4">
                    <button onclick="quickAsk('budget')" class="tag px-3 py-1.5 rounded-full text-xs text-purple-300">💰 预算推荐</button>
                    <button onclick="quickAsk('spicy')" class="tag px-3 py-1.5 rounded-full text-xs text-purple-300">🌶️ 想吃辣的</button>
                    <button onclick="quickAsk('halal')" class="tag px-3 py-1.5 rounded-full text-xs text-purple-300">☪️ 清真食品</button>
                    <button onclick="quickAsk('group')" class="tag px-3 py-1.5 rounded-full text-xs text-purple-300">👥 多人聚餐</button>
                </div>
            </section>

            <!-- Chat Interface -->
            <section id="chatSection" class="mb-6">
                <div id="chatMessages" class="space-y-3">
                    <!-- Welcome Message -->
                    <div class="flex gap-2 slide-up">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-500 to-blue-500 flex-shrink-0 flex items-center justify-center">
                            <span class="text-xs">🤖</span>
                        </div>
                        <div class="message-bubble glass rounded-2xl rounded-tl-sm px-4 py-3">
                            <p class="text-sm" data-i18n="welcomeMsg">你好！我是你的 AI 点餐助手。今天想吃什么？可以告诉我你的预算、口味偏好，或者特殊饮食需求。</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Menu Section -->
            <section id="menuSection" class="hidden">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-lg font-semibold" data-i18n="recommended">推荐菜品</h3>
                    <button onclick="clearMenu()" class="text-xs text-gray-400">清除</button>
                </div>
                <div id="menuGrid" class="space-y-3">
                    <!-- Menu items will be inserted here -->
                </div>
            </section>

            <!-- Popular Dishes (Default) -->
            <section id="popularSection">
                <h3 class="text-lg font-semibold mb-3" data-i18n="popular">热门菜品</h3>
                <div id="popularGrid" class="space-y-3">
                    <!-- Popular items -->
                </div>
            </section>
        </main>

        <!-- Input Area -->
        <div class="fixed bottom-0 left-0 right-0 glass border-t border-white/10">
            <div class="max-w-md mx-auto px-4 py-3 flex items-center gap-2">
                <button id="micBtn" onclick="toggleVoice()" class="mic-btn w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0">
                    <svg id="micIcon" class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
                    </svg>
                </button>
                <input 
                    id="textInput" 
                    type="text" 
                    class="flex-1 bg-white/10 rounded-full px-4 py-2.5 text-sm outline-none placeholder-gray-500"
                    placeholder="输入或语音说出你的需求..."
                    onkeypress="if(event.key==='Enter')sendMessage()"
                >
                <button onclick="sendMessage()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center">
                    <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Cart Modal -->
        <div id="cartModal" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-black/80" onclick="hideCart()"></div>
            <div class="absolute bottom-0 left-0 right-0 glass rounded-t-3xl p-6 max-w-md mx-auto">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold" data-i18n="cart">购物车</h3>
                    <button onclick="hideCart()" class="text-gray-400">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div id="cartItems" class="space-y-3 mb-4 max-h-64 overflow-y-auto">
                    <!-- Cart items -->
                </div>
                <div class="border-t border-white/10 pt-4">
                    <div class="flex justify-between mb-4">
                        <span class="text-gray-400" data-i18n="total">总计</span>
                        <span id="cartTotal" class="text-xl font-bold gradient-text">₦0</span>
                    </div>
                    <button onclick="checkout()" class="w-full py-3 rounded-full bg-gradient-to-r from-purple-500 to-blue-500 font-semibold text-sm" data-i18n="checkout">确认订单</button>
                </div>
            </div>
        </div>

        <!-- Dish Detail Modal -->
        <div id="dishModal" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-black/90" onclick="hideDish()"></div>
            <div class="absolute inset-x-0 bottom-0 top-20 glass rounded-t-3xl overflow-hidden max-w-md mx-auto">
                <div id="dishContent" class="h-full overflow-y-auto">
                    <!-- Dish detail content -->
                </div>
            </div>
        </div>
    </div>

    <script>
    // ============ CONFIG ============
    const CONFIG = {
        API_KEY: '', // User fills this in
        API_URL: 'https://api.moonshot.cn/v1/chat/completions',
        MODEL: 'moonshot-v1-8k',
        MAX_TURNS: 10
    };

    // ============ I18N ============
    const i18n = {
        zh: {
            heroTitle: 'AI 智能点餐',
            heroSubtitle: '告诉我你的口味、预算和人数',
            welcomeMsg: '你好！我是你的 AI 点餐助手。今天想吃什么？可以告诉我你的预算、口味偏好，或者特殊饮食需求。',
            recommended: '推荐菜品',
            popular: '热门菜品',
            cart: '购物车',
            total: '总计',
            checkout: '确认订单',
            addToCart: '加入购物车',
            added: '已添加',
            voicePrompt: '请说话...',
            listening: '正在聆听...',
            placeholder: '输入或语音说出你的需求...'
        },
        en: {
            heroTitle: 'AI Smart Ordering',
            heroSubtitle: 'Tell me your taste, budget, and party size',
            welcomeMsg: 'Hi! I\'m your AI dining assistant. What would you like today? Tell me your budget, taste preference, or dietary requirements.',
            recommended: 'Recommended',
            popular: 'Popular Dishes',
            cart: 'Cart',
            total: 'Total',
            checkout: 'Place Order',
            addToCart: 'Add to Cart',
            added: 'Added',
            voicePrompt: 'Speak now...',
            listening: 'Listening...',
            placeholder: 'Type or speak your request...'
        }
    };

    let currentLang = 'zh';
    let isListening = false;
    let recognition = null;
    let cart = [];
    let conversationHistory = [];

    // ============ MENU DATA (African Localized) ============
    const menuData = [
        {
            id: 1,
            name: { zh: '尼日利亚 jollof 米饭', en: 'Nigerian Jollof Rice' },
            desc: { zh: '西非经典番茄香料饭，配烤鸡', en: 'West African classic tomato spiced rice with grilled chicken' },
            price: 3500,
            currency: '₦',
            tags: ['halal', 'spicy', 'popular'],
            image: 'https://images.unsplash.com/photo-1604329760661-e71dc83f8f26?w=400',
            calories: 650,
            prepTime: '25 min',
            origin: { zh: '尼日利亚', en: 'Nigeria' }
        },
        {

            name: { zh: '苏亚烤肉串', en: 'Suya Grilled Skewers' },
            desc: { zh: '花生香料腌制的牛肉串，炭火烤制', en: 'Peanut-spiced beef skewers, charcoal grilled' },
            price: 2000,
            currency: '₦',
            tags: ['halal', 'spicy', 'street-food'],
            image: 'https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=400',
            calories: 420,
            prepTime: '15 min',
            origin: { zh: '尼日利亚北部', en: 'Northern Nigeria' }
        },
        {
            id: 3,
            name: { zh: '埃古西汤配 Fufu', en: 'Egusi Soup with Fufu' },
            desc: { zh: '瓜子炖汤配发酵木薯面团', en: 'Melon seed soup with fermented cassava dough' },
            price: 2800,
            currency: '₦',
            tags: ['halal', 'traditional', 'gluten-free'],
            image: 'https://images.unsplash.com/photo-1547592180-85f173990554?w=400',
            calories: 580,
            prepTime: '35 min',
            origin: { zh: '西非', en: 'West Africa' }
        },
        {
            id: 4,
            name: { zh: '烤全鱼配薯条', en: 'Grilled Whole Fish & Chips' },
            desc: { zh: '新鲜尼罗河鲈鱼，配非洲香料', en: 'Fresh Nile perch with African spices' },
            price: 4500,
            currency: '₦',
            tags: ['halal', 'seafood', 'premium'],
            image: 'https://images.unsplash.com/photo-1534939561126-855b8675edd7?w=400',
            calories: 520,
            prepTime: '30 min',
            origin: { zh: '东非湖区', en: 'East African Lakes' }
        },
        {
            id: 5,
            name: { zh: '素食豆炖饭', en: 'Vegetarian Bean Stew' },
            desc: { zh: '黑眼豆炖菜配椰奶和菠菜', en: 'Black-eyed pea stew with coconut milk and spinach' },
            price: 1800,
            currency: '₦',
            tags: ['vegetarian', 'vegan', 'healthy'],
            image: 'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400',
            calories: 380,
            prepTime: '20 min',
            origin: { zh: '尼日利亚', en: 'Nigeria' }
        },
        {
            id: 6,
            name: { zh: '芒果鲜虾沙拉', en: 'Mango Prawn Salad' },
            desc: { zh: '新鲜芒果配大虾，清爽开胃', en: 'Fresh mango with prawns, light and refreshing' },
            price: 3200,
            currency: '₦',
            tags: ['seafood', 'healthy', 'appetizer'],
            image: 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400',
            calories: 290,
            prepTime: '10 min',
            origin: { zh: '西非海岸', en: 'West African Coast' }
        }
    ];

    // ============ INIT ============
    function init() {
        renderPopular();
        initVoice();
        updateUI();
    }

    function updateUI() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (i18n[currentLang][key]) {
                el.textContent = i18n[currentLang][key];
            }
        });
        document.getElementById('textInput').placeholder = i18n[currentLang].placeholder;
        document.getElementById('langBtn').textContent = currentLang.toUpperCase();
    }

    function toggleLang() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        updateUI();
    }

    // ============ VOICE ============
    function initVoice() {
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = currentLang === 'zh' ? 'zh-CN' : 'en-US';

            recognition.onstart = () => {
                isListening = true;
                document.getElementById('micBtn').classList.add('listening');
                document.getElementById('textInput').placeholder = i18n[currentLang].listening;
            };

            recognition.onresult = (event) => {
                let final = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        final += event.results[i][0].transcript;
                    }
                }
                if (final) {
                    document.getElementById('textInput').value = final;
                }
            };

            recognition.onend = () => {
                isListening = false;
                document.getElementById('micBtn').classList.remove('listening');
                document.getElementById('textInput').placeholder = i18n[currentLang].placeholder;
                const val = document.getElementById('textInput').value;
                if (val.trim()) {
                    sendMessage();
                }
            };

            recognition.onerror = () => {
                isListening = false;
                document.getElementById('micBtn').classList.remove('listening');
            };
        }
    }

    function toggleVoice() {
        if (!recognition) {
            alert('您的浏览器不支持语音识别，请手动输入');
            return;
        }
        if (isListening) {
            recognition.stop();
        } else {
            recognition.lang = currentLang === 'zh' ? 'zh-CN' : 'en-US';
            recognition.start();
        }
    }

    // ============ CHAT ============
    function addMessage(text, isUser = false) {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = `flex gap-2 slide-up ${isUser ? 'flex-row-reverse' : ''}`;
        
        if (isUser) {
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-white/20 flex-shrink-0 flex items-center justify-center">
                    <span class="text-xs">👤</span>
                </div>
                <div class="message-bubble bg-purple-500/30 rounded-2xl rounded-tr-sm px-4 py-3">
                    <p class="text-sm">${escapeHtml(text)}</p>
                </div>
            `;
        } else {
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-500 to-blue-500 flex-shrink-0 flex items-center justify-center">
                    <span class="text-xs">🤖</span>
                </div>
                <div class="message-bubble glass rounded-2xl rounded-tl-sm px-4 py-3">
                    <p class="text-sm">${text}</p>
                </div>
            `;
        }
        
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function addTyping() {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.id = 'typingIndicator';
        div.className = 'flex gap-2 slide-up';
        div.innerHTML = `
            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-500 to-blue-500 flex-shrink-0 flex items-center justify-center">
                <span class="text-xs">🤖</span>
            </div>
            <div class="message-bubble glass rounded-2xl rounded-tl-sm px-4 py-3">
                <div class="flex gap-1">
                    <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                </div>
            </div>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function removeTyping() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function sendMessage() {
        const input = document.getElementById('textInput');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        addMessage(text, true);
        conversationHistory.push({ role: 'user', content: text });

        addTyping();

        // Check if API key is configured
        if (!CONFIG.API_KEY) {
            removeTyping();
            // Fallback: use rule-based recommendation
            const response = getRuleBasedResponse(text);
            addMessage(response.text);
            if (response.dishes && response.dishes.length > 0) {
                showRecommended(response.dishes);
            }
            conversationHistory.push({ role: 'assistant', content: response.text });
            return;
        }

        // Call Moonshot API
        try {
            const response = await fetch(CONFIG.API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${CONFIG.API_KEY}`
                },
                body: JSON.stringify({
                    model: CONFIG.MODEL,
                    messages: [
                        {
                            role: 'system',
                            content: `You are an AI restaurant assistant for a restaurant in Lagos, Nigeria. You help customers find dishes based on their preferences, budget, dietary restrictions, and party size. Respond in ${currentLang === 'zh' ? 'Chinese' : 'English'}. Keep responses concise and friendly. You can recommend dishes from: Jollof Rice, Suya Skewers, Egusi Soup, Grilled Fish, Bean Stew, Mango Prawn Salad.`
                        },
                        ...conversationHistory.slice(-CONFIG.MAX_TURNS)
                    ],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            removeTyping();
            
            if (data.choices && data.choices[0]) {
                const aiText = data.choices[0].message.content;
                addMessage(aiText);
                conversationHistory.push({ role: 'assistant', content: aiText });
                
                // Try to extract dish recommendations
                const matchedDishes = matchDishes(aiText);
                if (matchedDishes.length > 0) {
                    showRecommended(matchedDishes);
                }
            }
        } catch (error) {
            removeTyping();
            const fallback = getRuleBasedResponse(text);
            addMessage(fallback.text);
            if (fallback.dishes && fallback.dishes.length > 0) {
                showRecommended(fallback.dishes);
            }
        }
    }

    function getRuleBasedResponse(text) {
        const lower = text.toLowerCase();
        let dishes = [];
        let response = '';

        if (lower.includes('辣') || lower.includes('spicy') || lower.includes('hot')) {
            dishes = [1, 2, 3];
            response = currentLang === 'zh' 
                ? '推荐几道辣味菜品：Jollof 米饭香辣开胃，苏亚烤肉串花生香料味浓郁，埃古西汤也是不错的选择！'
                : 'Here are some spicy recommendations: Jollof Rice is flavorful and spicy, Suya Skewers have rich peanut spice, and Egusi Soup is also great!';
        } else if (lower.includes('预算') || lower.includes('便宜') || lower.includes('cheap') || lower.includes('budget')) {
            dishes = [5, 2];
            response = currentLang === 'zh'
                ? '这些菜品性价比很高：素食豆炖饭 ₦1,800，苏亚烤肉串 ₦2,000，都是美味又实惠的选择。'
                : 'These are budget-friendly: Vegetarian Bean Stew ₦1,800, Suya Skewers ₦2,000 - delicious and affordable!';
        } else if (lower.includes('清真') || lower.includes('halal') || lower.includes('muslim')) {
            dishes = [1, 2, 3, 4];
            response = currentLang === 'zh'
                ? '以下菜品均为清真食品：Jollof 米饭、苏亚烤肉串、埃古西汤、烤全鱼。放心享用！'
                : 'All these dishes are halal-certified: Jollof Rice, Suya Skewers, Egusi Soup, and Grilled Fish. Enjoy!';
        } else if (lower.includes('素') || lower.includes('vegetarian') || lower.includes('vegan')) {
            dishes = [5];
            response = currentLang === 'zh'
                ? '推荐素食豆炖饭，黑眼豆配椰奶和菠菜，营养丰富又美味！'
                : 'I recommend the Vegetarian Bean Stew - black-eyed peas with coconut milk and spinach, nutritious and delicious!';
        } else if (lower.includes('鱼') || lower.includes('海鲜') || lower.includes('fish') || lower.includes('seafood')) {
            dishes = [4, 6];
            response = currentLang === 'zh'
                ? '海鲜推荐：烤全鱼配薯条（新鲜尼罗河鲈鱼）和芒果鲜虾沙拉，都是新鲜美味！'
                : 'Seafood recommendations: Grilled Whole Fish (fresh Nile perch) and Mango Prawn Salad - both fresh and delicious!';
        } else if (lower.includes('人') || lower.includes('group') || lower.includes('party') || lower.includes('share')) {
            dishes = [1, 3, 4];
            response = currentLang === 'zh'
                ? '多人聚餐推荐：Jollof 米饭（大份适合分享）、埃古西汤配 Fufu、烤全鱼。分量足，适合共享！'
                : 'For groups, I recommend: Jollof Rice (great for sharing), Egusi Soup with Fufu, and Grilled Whole Fish. Generous portions!';
        } else {
            dishes = [1, 4, 6];
            response = currentLang === 'zh'
                ? '为您推荐几道招牌菜：尼日利亚 Jollof 米饭（西非经典）、烤全鱼配薯条（新鲜海鲜）、芒果鲜虾沙拉（清爽开胃）。'
                : 'Here are our signature dishes: Nigerian Jollof Rice (West African classic), Grilled Whole Fish (fresh seafood), and Mango Prawn Salad (light and refreshing).';
        }

        return { text: response, dishes };
    }

    function matchDishes(text) {
        const lower = text.toLowerCase();
        const matches = [];
        const keywords = {
            1: ['jollof', 'rice', '米饭'],
            2: ['suya', 'skewer', '烤肉', '肉串'],
            3: ['egusi', 'soup', '汤', 'fufu'],
            4: ['fish', '鱼', '海鲜', 'seafood'],
            5: ['bean', 'vegetarian', 'vegan', '素', '豆'],
            6: ['mango', 'prawn', 'salad', '沙拉', '虾']
        };

        for (const [id, words] of Object.entries(keywords)) {
            if (words.some(w => lower.includes(w))) {
                matches.push(parseInt(id));
            }
        }

        return matches;
    }

    function quickAsk(type) {
        const prompts = {
            zh: {
                budget: '我预算有限，推荐便宜的',
                spicy: '我想吃辣的',
                halal: '我需要清真食品',
                group: '我们三个人，推荐适合聚餐的'
            },
            en: {
                budget: 'I have a limited budget, recommend something cheap',
                spicy: 'I want something spicy',
                halal: 'I need halal food',
                group: 'We are three people, recommend something for sharing'
            }
        };
        document.getElementById('textInput').value = prompts[currentLang][type];
        sendMessage();
    }

    // ============ MENU DISPLAY ============
    function renderPopular() {
        const container = document.getElementById('popularGrid');
        container.innerHTML = menuData.map(item => createDishCard(item)).join('');
    }

    function showRecommended(dishIds) {
        const section = document.getElementById('menuSection');
        const grid = document.getElementById('menuGrid');
        const dishes = menuData.filter(d => dishIds.includes(d.id));
        
        if (dishes.length === 0) return;
        
        grid.innerHTML = dishes.map(item => createDishCard(item)).join('');
        section.classList.remove('hidden');
        section.scrollIntoView({ behavior: 'smooth' });
    }

    function clearMenu() {
        document.getElementById('menuSection').classList.add('hidden');
    }

    function createDishCard(item) {
        const name = item.name[currentLang];
        const desc = item.desc[currentLang];
        const origin = item.origin[currentLang];
        
        return `
            <div class="menu-card glass rounded-2xl overflow-hidden" onclick="showDishDetail(${item.id})">
                <div class="flex">
                    <img src="${item.image}" alt="${name}" class="dish-img w-24 h-24 flex-shrink-0">
                    <div class="flex-1 p-3">
                        <div class="flex justify-between items-start mb-1">
                            <h4 class="font-semibold text-sm">${name}</h4>
                            <span class="price-tag text-xs px-2 py-0.5 rounded-full font-bold">${item.currency}${item.price.toLocaleString()}</span>
                        </div>
                        <p class="text-xs text-gray-400 mb-2 line-clamp-2">${desc}</p>
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-gray-500">⏱️ ${item.prepTime}</span>
                            <span class="text-xs text-gray-500">🔥 ${item.calories} kcal</span>
                        </div>
                    </div>
                </div>
                <div class="px-3 pb-3 flex gap-2">
                    ${item.tags.map(tag => `<span class="text-xs px-2 py-0.5 rounded-full bg-white/5 text-gray-400">${getTagLabel(tag)}</span>`).join('')}
                </div>
            </div>
        `;
    }

    function getTagLabel(tag) {
        const labels = {
            zh: { halal: '清真', spicy: '辣味', vegetarian: '素食', vegan: '纯素', seafood: '海鲜', popular: '热门', 'street-food': '街头', traditional: '传统', healthy: '健康', appetizer: '开胃', 'gluten-free': '无麸质', premium: '精品' },
            en: { halal: 'Halal', spicy: 'Spicy', vegetarian: 'Vegetarian', vegan: 'Vegan', seafood: 'Seafood', popular: 'Popular', 'street-food': 'Street Food', traditional: 'Traditional', healthy: 'Healthy', appetizer: 'Appetizer', 'gluten-free': 'Gluten-Free', premium: 'Premium' }
        };
        return labels[currentLang][tag] || tag;
    }

    // ============ DISH DETAIL ============
    function showDishDetail(id) {
        const item = menuData.find(d => d.id === id);
        if (!item) return;

        const modal = document.getElementById('dishModal');
        const content = document.getElementById('dishContent');
        
        content.innerHTML = `
            <div class="relative">
                <img src="${item.image}" class="w-full h-56 object-cover">
                <button onclick="hideDish()" class="absolute top-4 right-4 w-8 h-8 rounded-full bg-black/50 flex items-center justify-center">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="p-6">
                <div class="flex justify-between items-start mb-3">
                    <h2 class="text-xl font-bold">${item.name[currentLang]}</h2>
                    <span class="price-tag text-lg px-3 py-1 rounded-full font-bold">${item.currency}${item.price.toLocaleString()}</span>
                </div>
                <p class="text-gray-400 mb-4">${item.desc[currentLang]}</p>
                
                <div class="grid grid-cols-3 gap-3 mb-4">
                    <div class="glass rounded-xl p-3 text-center">
                        <div class="text-lg">⏱️</div>
                        <div class="text-xs text-gray-400">${item.prepTime}</div>
                    </div>
                    <div class="glass rounded-xl p-3 text-center">
                        <div class="text-lg">🔥</div>
                        <div class="text-xs text-gray-400">${item.calories} kcal</div>
                    </div>
                    <div class="glass rounded-xl p-3 text-center">
                        <div class="text-lg">📍</div>
                        <div class="text-xs text-gray-400">${item.origin[currentLang]}</div>
                    </div>
                </div>

                <div class="flex flex-wrap gap-2 mb-6">
                    ${item.tags.map(tag => `<span class="text-xs px-3 py-1 rounded-full bg-purple-500/20 text-purple-300">${getTagLabel(tag)}</span>`).join('')}
                </div>

                <button onclick="addToCart(${item.id}); hideDish();" class="w-full py-3 rounded-full bg-gradient-to-r from-purple-500 to-blue-500 font-semibold">
                    ${i18n[currentLang].addToCart} - ${item.currency}${item.price.toLocaleString()}
                </button>
            </div>
        `;
        
        modal.classList.remove('hidden');
    }

    function hideDish() {
        document.getElementById('dishModal').classList.add('hidden');
    }

    // ============ CART ============
    function addToCart(id) {
        const item = menuData.find(d => d.id === id);
        if (!item) return;

        const existing = cart.find(c => c.id === id);
        if (existing) {
            existing.qty++;
        } else {
            cart.push({ ...item, qty: 1 });
        }
        
        updateCartUI();
        
        // Show toast
        const toast = document.createElement('div');
        toast.className = 'fixed top-20 left-1/2 transform -translate-x-1/2 glass px-4 py-2 rounded-full text-sm z-50 slide-up';
        toast.textContent = `${item.name[currentLang]} ${i18n[currentLang].added}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function updateCartUI() {
        const count = cart.reduce((sum, c) => sum + c.qty, 0);
        const badge = document.getElementById('cartCount');
        if (count > 0) {
            badge.textContent = count;
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }
    }

    function showCart() {
        const modal = document.getElementById('cartModal');
        const container = document.getElementById('cartItems');
        
        if (cart.length === 0) {
            container.innerHTML = `<p class="text-center text-gray-400 py-8">${currentLang === 'zh' ? '购物车是空的' : 'Cart is empty'}</p>`;
        } else {
            container.innerHTML = cart.map(item => `
                <div class="flex items-center gap-3 glass rounded-xl p-3">
                    <img src="${item.image}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-1">
                        <h4 class="text-sm font-medium">${item.name[currentLang]}</h4>
                        <p class="text-xs text-gray-400">${item.currency}${item.price.toLocaleString()} × ${item.qty}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="changeQty(${item.id}, -1)" class="w-6 h-6 rounded-full bg-white/10 flex items-center justify-center text-sm">-</button>
                        <span class="text-sm w-4 text-center">${item.qty}</span>
                        <button onclick="changeQty(${item.id}, 1)" class="w-6 h-6 rounded-full bg-white/10 flex items-center justify-center text-sm">+</button>
                    </div>
                </div>
            `).join('');
        }
        
        const total = cart.reduce((sum, c) => sum + c.price * c.qty, 0);
        document.getElementById('cartTotal').textContent = `₦${total.toLocaleString()}`;
        
        modal.classList.remove('hidden');
    }

    function hideCart() {
        document.getElementById('cartModal').classList.add('hidden');
    }

    function changeQty(id, delta) {
        const item = cart.find(c => c.id === id);
        if (!item) return;
        
        item.qty += delta;
        if (item.qty <= 0) {
            cart = cart.filter(c => c.id !== id);
        }
        
        updateCartUI();
        showCart(); // Refresh modal
    }

    function checkout() {
        if (cart.length === 0) return;
        
        const total = cart.reduce((sum, c) => sum + c.price * c.qty, 0);
        alert(currentLang === 'zh' 
            ? `订单已提交！总计 ₦${total.toLocaleString()}\n\n（演示模式 - 无实际支付）`
            : `Order placed! Total ₦${total.toLocaleString()}\n\n(Demo mode - no actual payment)`
        );
        
        cart = [];
        updateCartUI();
        hideCart();
    }

    // ============ INIT APP ============
    init();
    </script>
</body>
</html>
